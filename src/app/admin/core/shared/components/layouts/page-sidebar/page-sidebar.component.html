<aside class="sidebar">
  <a class="admin-logo" [ngClass]="isSidebarCollapsed ? 'logoLeft' : ''" [routerLink]="['/dashboard']">
    <img [src]="
        isSidebarCollapsed ? 'assets/img/fav.PNG' : 'assets/img/fav.PNG'
      " alt="logo" [ngStyle]="{
        height: isSidebarCollapsed ? '32px' : '60px',
      }" />
  </a>
  <div class="navigation-outer">
    <mat-accordion class="sidemenu">
      <mat-expansion-panel *ngFor="let menus of Menulist">
        <mat-expansion-panel-header class="">
          <mat-panel-title>
            <span class="matMenuIcon">
              <i class="{{ menus.Menuicon }}"></i></span>
            <span class="ps-2 user-select-none fs-5 matMenuName">{{
              menus.menuName
            }}</span>
          </mat-panel-title>
        </mat-expansion-panel-header>
        <ul>
          <li *ngFor="let subMenu of menus.children">
            <div *ngIf="subMenu.children != ''">
              <mat-expansion-panel>
                <mat-expansion-panel-header class="" (click)="collapseSidebar()">
                  <mat-panel-title>
                    <span> <i class="{{ subMenu.Menuicon }}"></i></span>
                    <span class="ps-2 user-select-none fs-5 matMenuName">{{
                      subMenu.menuName
                    }}</span>
                  </mat-panel-title>
                </mat-expansion-panel-header>
                <ul>
                  <li *ngFor="let subsubMenu of subMenu.children">
                    <div *ngIf="subsubMenu.children != ''">
                      <mat-expansion-panel>
                        <mat-expansion-panel-header class="">
                          <mat-panel-title class=" ">
                            <span class="matMenuIcon">
                              <i class="{{ subsubMenu.Menuicon }}"></i></span>
                            <span class="ps-2 user-select-none fs-5 matMenuName">{{ subsubMenu.menuName }}</span>
                          </mat-panel-title>
                        </mat-expansion-panel-header>
                        <ul>
                          <li *ngFor="let subsubsubMenu of subsubMenu.children">
                            <a [routerLink]="[subsubsubMenu.path]"
                              (click)="closeMenu()">{{ subsubsubMenu.menuName }}</a>
                          </li>
                        </ul>
                      </mat-expansion-panel>
                    </div>
                  </li>
                </ul>
              </mat-expansion-panel>
            </div>
          </li>
        </ul>
      </mat-expansion-panel>
    </mat-accordion>


  </div>
</aside>
